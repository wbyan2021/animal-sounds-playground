<svg viewBox="0 0 600 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label{font-family:system-ui,sans-serif;font-size:13px;fill:#2C2C2A;font-weight:500}
    .score{font-family:system-ui,sans-serif;font-size:11px;fill:#5F5E5A}
    .grid{fill:none;stroke:#D3D1C7;stroke-width:0.5}
    .axis{stroke:#B4B2A9;stroke-width:0.5}
    .current{fill:rgba(29,158,117,0.18);stroke:#0F6E56;stroke-width:2}
    .target{fill:none;stroke:#993C1D;stroke-width:1.5;stroke-dasharray:5 4}
    .dot-c{fill:#0F6E56}
    .dot-t{fill:#993C1D}
  </style>

  <!-- Grid rings (levels 2,4,6,8,10) -->
  <polygon class="grid" points="300,214 331.2,232 331.2,268 300,286 268.8,268 268.8,232"/>
  <polygon class="grid" points="300,178 362.4,214 362.4,286 300,322 237.6,286 237.6,214"/>
  <polygon class="grid" points="300,142 393.6,196 393.6,304 300,358 206.4,304 206.4,196"/>
  <polygon class="grid" points="300,106 424.8,178 424.8,322 300,394 175.2,322 175.2,178"/>
  <polygon class="grid" points="300,70 455.9,160 455.9,340 300,430 144.1,340 144.1,160"/>

  <!-- Axes -->
  <line class="axis" x1="300" y1="250" x2="300" y2="70"/>
  <line class="axis" x1="300" y1="250" x2="455.9" y2="160"/>
  <line class="axis" x1="300" y1="250" x2="455.9" y2="340"/>
  <line class="axis" x1="300" y1="250" x2="300" y2="430"/>
  <line class="axis" x1="300" y1="250" x2="144.1" y2="340"/>
  <line class="axis" x1="300" y1="250" x2="144.1" y2="160"/>

  <!-- Target polygon (9,8,9,9,8,8) -->
  <polygon class="target" points="300,88 424.7,178 440.3,331 300,412 175.3,322 175.3,178"/>

  <!-- Current polygon (8,4,7,9,3,5) -->
  <polygon class="current" points="300,106 362.4,214 409.2,313 300,412 253.2,277 222,205"/>

  <!-- Current dots -->
  <circle class="dot-c" cx="300" cy="106" r="4"/>
  <circle class="dot-c" cx="362.4" cy="214" r="4"/>
  <circle class="dot-c" cx="409.2" cy="313" r="4"/>
  <circle class="dot-c" cx="300" cy="412" r="4"/>
  <circle class="dot-c" cx="253.2" cy="277" r="4"/>
  <circle class="dot-c" cx="222" cy="205" r="4"/>

  <!-- Labels with scores -->
  <text class="label" x="300" y="55" text-anchor="middle">产品价值</text>
  <text class="score" x="300" y="40" text-anchor="middle">8 / 10</text>

  <text class="label" x="475" y="150" text-anchor="middle">内容深度</text>
  <text class="score" x="475" y="135" text-anchor="middle">4 / 10</text>

  <text class="label" x="475" y="358" text-anchor="middle">用户体验</text>
  <text class="score" x="475" y="373" text-anchor="middle">7 / 10</text>

  <text class="label" x="300" y="453" text-anchor="middle">技术架构</text>
  <text class="score" x="300" y="468" text-anchor="middle">9 / 10</text>

  <text class="label" x="125" y="358" text-anchor="middle">社区生态</text>
  <text class="score" x="125" y="373" text-anchor="middle">3 / 10</text>

  <text class="label" x="125" y="150" text-anchor="middle">可持续性</text>
  <text class="score" x="125" y="135" text-anchor="middle">5 / 10</text>

  <!-- Legend -->
  <rect x="30" y="475" width="12" height="12" fill="rgba(29,158,117,0.18)" stroke="#0F6E56" stroke-width="1.5"/>
  <text class="score" x="48" y="485">当前状态</text>
  <line x1="130" y1="481" x2="155" y2="481" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text class="score" x="161" y="485">理想目标</text>
</svg>
